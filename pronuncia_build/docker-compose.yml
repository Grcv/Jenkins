version: '3.8'

services:
  frontend:
    build:
      context: ./pronuncia_frontend
    container_name: pronuncia_frontend
    restart: always
    ports:
      - "80:80"  # SSR con Express corre en el puerto 4000
    depends_on:
      - backend
    networks:
      - pronuncia-net

  backend:
    build:
      context: ./pronuncia_backend
    environment:
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - ZOHO_USER=${ZOHO_USER}
      - ZOHO_PASS=${ZOHO_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    container_name: pronuncia_backend
    restart: always
    ports:
      - "8100:8000"
    networks:
      - pronuncia-net

  postgres:
    image: postgres:16
    container_name: postgres-database
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydatabase
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pronuncia-net

volumes:
  postgres_data:

networks:
  pronuncia-net:
    driver: bridge
